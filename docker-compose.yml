services:
  postgres:
    build:
      context: .
      dockerfile: docker/postgres/Dockerfile
    image: url-shortener-postgres:18.4
    container_name: url-shortener-postgres
    restart: unless-stopped
    command:
      - postgres
      - -c
      - shared_preload_libraries=pg_cron
      - -c
      - cron.database_name=url_shortener
      - -c
      - cron.timezone=UTC
      - -c
      - cron.use_background_workers=on
      - -c
      - timezone=UTC
    environment:
      POSTGRES_DB: url_shortener
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d url_shortener"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  broker:
    image: confluentinc/confluent-local:8.2.2
    container_name: url-shortener-broker
    ports:
      - "9092:9092"

volumes:
  postgres-data:
